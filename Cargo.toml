[package]
name = "kodiki"
version = "0.1.0"
edition = "2021"

[package.metadata.rust-analyzer]
rustc_private = true

# 1 Enable only a small amount of optimization in debug mode
[profile.dev]
opt-level = 1

# 3 Enable high optimizations for dependencies (incl. Bevy), but not for our code:
[profile.dev.package."*"]
opt-level = 3

[dependencies]

itertools			= "0.10"
directories 		= "4.0"
ron 				= "0.7"
serde 				= { version = "1", features = ["derive"] }
serde_json			= { version = "1.0.83" }
hex                 = { version = "0.4.3"}

bevy 				= { version = "0.9", features = ["bevy_render"] }

bevy_reader_camera	= { git = "https://github.com/gavlig/bevy_reader_camera.git" } # { path = "../bevy_reader_camera" }
bevy_mod_picking	= { version = "0.10" } # { git = "https://github.com/gavlig/bevy_mod_picking.git", branch = "kodiki" }
iyes_loopless		= { version = "0.9" }
# bevy_infinite_grid	= { path = "../bevy_infinite_grid" } # { git = "https://github.com/gavlig/bevy_infinite_grid"}
bevy_shadertoy_wgsl	= { git = "https://github.com/gavlig/bevy_shadertoy_wgsl.git" } # { path = "../bevy_shadertoy_wgsl" }
bevy_contrib_colors = { git = "https://github.com/gavlig/bevy_contrib_colors.git" }
bevy_tweening		= { version = "0.6" }

bevy-debug-text-overlay = { version = "4.0" }
bevy_prototype_debug_lines = { version = "0.9", features = ["3d"] }
bevy_polyline       = "0.4"

#
# TEXT RENDERING START
#

ab_glyph            = "0.2.18"  # read ttf/otf and get parametric glyphs # { path = "../ab-glyph/glyph" }
lyon                = "1.0.1"   # convert paramteric glyphs to 2d geometry # { path = "../lyon" }

#
# TEXT RENDERING END
#

#
# HELIX START
#

helix-core			= { path = "third_party/helix-editor/helix-core" }
helix-lsp			= { path = "third_party/helix-editor/helix-lsp" }
helix-dap			= { path = "third_party/helix-editor/helix-dap" }
helix-loader		= { path = "third_party/helix-editor/helix-loader" }
helix-view			= { path = "third_party/helix-editor/helix-view" }
helix-term			= { path = "third_party/helix-editor/helix-term" }
helix-tui			= { path = "third_party/helix-editor/helix-tui" }

anyhow				= "1"
signal-hook			= "0.3"
[target.'cfg(not(windows))'.dependencies]  # https://github.com/vorner/signal-hook/issues/100
signal-hook-tokio	= { version = "0.3", features = ["futures-v0_3"] }

tokio				= { version = "1", features = ["rt", "rt-multi-thread", "io-util", "io-std", "time", "process", "macros", "fs", "parking_lot"] }
tokio-stream		= { version = "0.1" }
arc-swap			= { version = "1.5.1" }
futures-util		= { version = "0.3", features = ["std", "async-await"], default-features = false }

# Logging
log					= { version = "0.4" }

# config
toml				= { version = "0.5" }

#
# HELIX END
#